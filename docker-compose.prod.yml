# Despliegue de producción vía Coolify (recurso "Docker Compose" apuntando a
# este repo). Todas las ${VARIABLES} se definen en el panel de Coolify —
# los valores reales viven en .deploy/secrets-produccion.env (gitignoreado).
#
# Dominios (se asignan en Coolify, no aquí):
#   frontend → FRONTEND_URL           (puerto 3000)
#   backend  → NEXT_PUBLIC_API_URL    (puerto 4000; el navegador se conecta
#              directo para REST + WebSockets /chat y /notifications)
# FRONTEND_URL y NEXT_PUBLIC_API_URL son URLs completas CON esquema
# (http:// en los dominios temporales sslip.io, https:// con el dominio
# definitivo) y deben coincidir con los Domains asignados en Coolify.
# postgres/redis/garage son solo internos (sin puertos publicados).

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-university_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-university_db}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-university_user} -d ${POSTGRES_DB:-university_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  garage:
    image: dxflrs/garage:v2.3.0
    restart: unless-stopped
    command: /garage server --single-node --default-bucket
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      GARAGE_DEFAULT_ACCESS_KEY: ${S3_ACCESS_KEY}
      GARAGE_DEFAULT_SECRET_KEY: ${S3_SECRET_KEY}
      GARAGE_DEFAULT_BUCKET: university-files
    volumes:
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
    # La config va como `configs` inline (no bind mount de un archivo del
    # repo: Coolify crea un directorio vacío en su lugar y Garage falla con
    # "Is a directory"). Sin secretos: rpc_secret/admin_token llegan por env.
    configs:
      - source: garage_config
        target: /etc/garage.toml

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-university_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-university_db}?schema=public
      REDIS_URL: redis://redis:6379
      # CORS + orígenes de los gateways WebSocket (URL completa con esquema)
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 1d
      JWT_REMEMBER_EXPIRES_IN: 30d
      S3_ENDPOINT: http://garage:3900
      S3_REGION: garage
      S3_BUCKET: university-files
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Vacío → el backend usa el primer origen de FRONTEND_URL + /login.
      # No derivarla de ${FRONTEND_URL} aquí: esa variable puede llevar varios
      # orígenes separados por coma (raíz + www) y el link saldría roto.
      MAIL_LOGIN_URL: ${MAIL_LOGIN_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # URL pública del API (con esquema): se inlinea en el bundle del navegador
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        # Red interna: fetchers server-side y el rewrite de /files/*
        API_URL: http://backend:4000
        # Umami (servicio aparte en Coolify): script + website id, inlineados
        # en el build. Vacíos → sin analíticas (no rompe nada).
        NEXT_PUBLIC_UMAMI_SRC: ${NEXT_PUBLIC_UMAMI_SRC:-}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
    restart: unless-stopped
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      API_URL: http://backend:4000
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  garage_data:
  garage_meta:

configs:
  garage_config:
    content: |
      metadata_dir = "/var/lib/garage/meta"
      data_dir = "/var/lib/garage/data"
      db_engine = "sqlite"
      replication_factor = 1
      rpc_bind_addr = "[::]:3901"

      [s3_api]
      s3_region = "garage"
      api_bind_addr = "[::]:3900"

      [admin]
      api_bind_addr = "[::]:3903"
