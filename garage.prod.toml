# Configuración de Garage para producción (Coolify).
# A diferencia del garage.toml local (gitignoreado), este archivo NO contiene
# secretos: rpc_secret y admin_token llegan por variables de entorno
# (GARAGE_RPC_SECRET / GARAGE_ADMIN_TOKEN) definidas en Coolify.
metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"
replication_factor = 1
rpc_bind_addr = "[::]:3901"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"

[admin]
api_bind_addr = "[::]:3903"
